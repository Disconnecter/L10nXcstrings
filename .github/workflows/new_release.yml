name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "The new release tag (e.g., 0.0.6). Leave empty if already pushing a tag."
        required: false
      release_notes:
        description: "Release notes for the new version (optional)."
        required: false
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag input
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          if [ -z "${{ inputs.tag }}" ]; then
            echo "Input tag is required when running manually."
            exit 1
          fi
          if ! echo "${{ inputs.tag }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag must use the existing bare semver format, for example 0.0.6."
            exit 1
          fi

      - name: Validate project version
        run: |
          set -euo pipefail
          PROJECT_VERSION="$(python3 - <<'PY'
          import pathlib
          import tomllib

          pyproject = pathlib.Path("pyproject.toml")
          print(tomllib.loads(pyproject.read_text(encoding="utf-8"))["project"]["version"])
          PY
          )"
          if [ "$PROJECT_VERSION" != "${{ env.TAG }}" ]; then
            echo "Tag ${{ env.TAG }} does not match pyproject.toml version $PROJECT_VERSION."
            exit 1
          fi

      - name: Create GitHub release (manual with notes)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          body: ${{ inputs.release_notes }}

      - name: Create GitHub release (manual auto notes)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes == '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true

      - name: Create GitHub release (tag push)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.TAG }}
          generate_release_notes: true

      - name: Download release archive
        run: |
          set -euo pipefail
          ASSET_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ env.TAG }}.tar.gz"
          curl -L -o "l10n_xcstrings-${{ env.TAG }}.tar.gz" "$ASSET_URL"

      - name: Calculate SHA256
        id: calculate_sha
        run: |
          SHA256=$(sha256sum "l10n_xcstrings-${{ env.TAG }}.tar.gz" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: Disconnecter/homebrew-l10n
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-l10n

      - name: Ensure Homebrew tap remote uses token
        run: |
          cd homebrew-l10n
          git remote set-url origin https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/Disconnecter/homebrew-l10n.git

      - name: Update Homebrew formula
        run: |
          set -euo pipefail
          cd homebrew-l10n
          FORMULA_PATH="Formula/l10n_xcstrings.rb"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ env.TAG }}.tar.gz"

          sed -i "s|url \".*\"|url \"$URL\"|" "$FORMULA_PATH"
          sed -i "s|sha256 \".*\"|sha256 \"${{ steps.calculate_sha.outputs.sha256 }}\"|" "$FORMULA_PATH"

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$FORMULA_PATH"
          if git diff --cached --quiet; then
            echo "Homebrew formula already points at ${{ env.TAG }}."
            exit 0
          fi
          git commit -m "Update Homebrew formula for ${{ env.TAG }}"
          git push origin main
